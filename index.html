<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة التسويق — مطعم المزار الدمشقي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-main: #FFFFFF;
    --bg-secondary: #F7F5F2;
    --bg-beige: #F5F2EE;
    --card-beige: #E8E1D9;
    --brown-primary: #8B3A2B;
    --brown-hover: #7A3225;
    --brown-light: #A65A4A;
    --olive: #6F7F6A;
    --green-success: #2E7D32;
    --green-soft: #E8F5E9;
    --red-negative: #C62828;
    --amber-warning: #F9A825;
    --blue-info: #1565C0;
    --text-main: #1F1F1F;
    --text-secondary: #6B6B6B;
    --border: #EAE6E1;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --font: 'IBM Plex Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg-secondary);
    color: var(--text-main);
    direction: rtl;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ===== HEADER ===== */
  .site-header {
    background: var(--bg-main);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .logo-placeholder {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-md);
    background: var(--bg-beige);
    border: 2px dashed var(--card-beige);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-secondary);
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .logo-placeholder:hover { border-color: var(--brown-light); }
  .logo-placeholder svg { display: block; margin: 0 auto 2px; }

  .header-text { flex: 1; }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--brown-primary);
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .period-tag {
    font-size: 12px;
    background: var(--bg-beige);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 3px 12px;
    border-radius: 20px;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    background: #FFF8E1;
    color: #B45309;
    border: 1px solid #FBBF24;
    padding: 3px 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .status-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--amber-warning);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ===== MAIN WRAPPER ===== */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  /* ===== SUMMARY CARD ===== */
  .summary-card {
    background: linear-gradient(135deg, #FDF9F7 0%, #F5EFE9 100%);
    border: 1px solid var(--border);
    border-right: 4px solid var(--brown-primary);
    border-radius: var(--radius-md);
    padding: 24px 28px;
    margin-bottom: 32px;
    box-shadow: var(--shadow-sm);
  }
  .summary-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--brown-light);
    margin-bottom: 10px;
  }
  .summary-text {
    font-size: 15px;
    color: var(--text-main);
    line-height: 1.9;
  }

  /* ===== KPI GRID ===== */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--brown-primary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .kpi-card {
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px; height: 100%;
    background: var(--brown-primary);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .kpi-card:hover::before { opacity: 1; }

  .kpi-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .kpi-value.positive { color: var(--green-success); }
  .kpi-value.negative { color: var(--red-negative); }
  .kpi-value.brown { color: var(--brown-primary); }

  /* ===== TABS ===== */
  .tabs-wrapper {
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .tabs-nav {
    display: flex;
    overflow-x: auto;
    background: var(--bg-beige);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    gap: 2px;
    scrollbar-width: none;
  }
  .tabs-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    padding: 14px 18px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    background: transparent;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .tab-btn:hover {
    color: var(--brown-primary);
    background: rgba(139, 58, 43, 0.05);
  }
  .tab-btn.active {
    color: var(--brown-primary);
    border-bottom-color: var(--brown-primary);
    font-weight: 700;
    background: var(--bg-main);
  }

  .tab-content { display: none; padding: 32px; animation: fadeIn 0.25s ease; }
  .tab-content.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== INSIGHT CARD ===== */
  .insight-card {
    background: linear-gradient(135deg, #F0F7F0 0%, #E8F5E9 100%);
    border: 1px solid #C8E6C9;
    border-right: 4px solid var(--green-success);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    margin-top: 24px;
  }
  .insight-card.amber {
    background: linear-gradient(135deg, #FFFDE7 0%, #FFF8E1 100%);
    border-color: #FFE082;
    border-right-color: var(--amber-warning);
  }
  .insight-card.blue {
    background: linear-gradient(135deg, #E3F2FD 0%, #E8F4FD 100%);
    border-color: #BBDEFB;
    border-right-color: var(--blue-info);
  }
  .insight-card.brown {
    background: linear-gradient(135deg, #FDF8F6 0%, #F5EDE9 100%);
    border-color: #E8C4B8;
    border-right-color: var(--brown-primary);
  }
  .insight-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--green-success);
    margin-bottom: 8px;
  }
  .insight-card.amber .insight-title { color: #B45309; }
  .insight-card.blue .insight-title { color: var(--blue-info); }
  .insight-card.brown .insight-title { color: var(--brown-primary); }
  .insight-text { font-size: 14px; color: var(--text-main); line-height: 1.8; }

  /* ===== TABLES ===== */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead th {
    background: var(--bg-beige);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 12px;
    padding: 13px 16px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg-beige); }
  tbody td {
    padding: 13px 16px;
    color: var(--text-main);
    vertical-align: middle;
  }
  tbody tr.total-row {
    background: var(--bg-beige);
    font-weight: 700;
  }
  .cell-positive { color: var(--green-success); font-weight: 600; }
  .cell-negative { color: var(--red-negative); font-weight: 600; }
  .cell-neutral { color: var(--text-secondary); }
  .cell-brown { color: var(--brown-primary); font-weight: 600; }
  .cell-pending {
    color: var(--amber-warning);
    font-weight: 600;
    font-size: 12px;
  }

  /* ===== MINI CARDS GRID ===== */
  .mini-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .mini-card {
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: box-shadow 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .mini-card:hover { box-shadow: var(--shadow-md); }
  .mini-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    background: var(--bg-beige);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .mini-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 3px; }
  .mini-value { font-size: 17px; font-weight: 700; color: var(--text-main); }
  .mini-value.success { color: var(--green-success); }
  .mini-value.brown { color: var(--brown-primary); }

  /* ===== WEEK CARDS ===== */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .week-card {
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s;
  }
  .week-card:hover { transform: translateY(-2px); }
  .week-number {
    font-size: 12px;
    font-weight: 700;
    color: var(--brown-primary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .week-dates {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .week-status {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 20px;
  }
  .week-status.done {
    background: var(--green-soft);
    color: var(--green-success);
    border: 1px solid #A5D6A7;
  }
  .week-status.pending {
    background: #FFF8E1;
    color: #B45309;
    border: 1px solid #FBBF24;
  }

  /* ===== BEST VIDEO CARD ===== */
  .best-video-card {
    background: linear-gradient(135deg, #FDF8F6 0%, #F5EDE9 100%);
    border: 1px solid var(--card-beige);
    border-radius: var(--radius-md);
    padding: 24px;
    margin-top: 20px;
  }
  .best-video-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--brown-primary);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .video-meta-row {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .video-meta-item { }
  .video-meta-key { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; font-weight: 500; }
  .video-meta-val { font-size: 18px; font-weight: 700; color: var(--text-main); }

  /* ===== NOTE CARDS ===== */
  .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .note-card {
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }
  .note-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .note-tag.marketing { background: #E3F2FD; color: var(--blue-info); }
  .note-tag.ops { background: #FFF8E1; color: #B45309; }
  .note-tag.platforms { background: var(--green-soft); color: var(--green-success); }
  .note-tag.sales { background: #F3E5F5; color: #6A1B9A; }
  .note-text { font-size: 14px; color: var(--text-main); line-height: 1.8; }

  /* ===== ACTION PLAN CARDS ===== */
  .plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .plan-card {
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-top: 3px solid var(--brown-primary);
    border-radius: var(--radius-md);
    padding: 22px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .plan-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .plan-icon { font-size: 24px; margin-bottom: 12px; }
  .plan-name { font-size: 15px; font-weight: 700; color: var(--brown-primary); margin-bottom: 10px; }
  .plan-text { font-size: 13.5px; color: var(--text-secondary); line-height: 1.8; }

  /* ===== STATUS CHIPS ===== */
  .chip-done {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    background: var(--green-soft);
    color: var(--green-success);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #A5D6A7;
  }
  .chip-done::before { content: '✓'; }

  /* ===== FOOTER ===== */
  .site-footer {
    text-align: center;
    padding: 28px 40px;
    font-size: 12px;
    color: var(--text-secondary);
    border-top: 1px solid var(--border);
    background: var(--bg-main);
    margin-top: 48px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .site-header { padding: 20px 20px; }
    .main { padding: 20px 16px 40px; }
    .header-title { font-size: 16px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .kpi-value { font-size: 20px; }
    .tab-content { padding: 20px 16px; }
    .week-grid { grid-template-columns: 1fr 1fr; }
    .notes-grid, .plan-grid { grid-template-columns: 1fr; }
    .mini-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .week-grid { grid-template-columns: 1fr; }
    .mini-grid { grid-template-columns: 1fr; }
    .header-inner { gap: 14px; }
    .logo-placeholder { width: 52px; height: 52px; }
  }
</style>
</head>

/* ==========================================
   SWITCH TAB FUNCTION
   ========================================== */
function switchTab(tabId) {
  // Update nav buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabId);
  });
  // Update content panels
  document.querySelectorAll('.tab-content').forEach(panel => {
    panel.classList.remove('active');
  });
  const panel = document.getElementById('tab-' + tabId);
  if (panel) panel.classList.add('active');
}

/* ==========================================
   INIT
   ========================================== */
function init() {
  renderSummary();
  renderKPIs();

  const nav = document.getElementById('tabsNav');
  const container = document.getElementById('tabsContainer');

  tabs.forEach((tab, idx) => {
    // Build nav button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.dataset.tab = tab.id;
    btn.textContent = tab.label;
    btn.addEventListener('click', () => switchTab(tab.id));
    nav.appendChild(btn);

    // Build content panel
    const panel = document.createElement('div');
    panel.className = 'tab-content' + (idx === 0 ? ' active' : '');
    panel.id = 'tab-' + tab.id;
    panel.innerHTML = tabRenderers[tab.id] ? tabRenderers[tab.id]() : '';
    container.appendChild(panel);
  });
}

document.addEventListener('DOMContentLoaded', init);
