<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة التسويق — مطعم المزار الدمشقي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=hIBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#FFFFFF;--bg2:#F7F5F2;--bg3:#F5F2EE;--card:#E8E1D9;
  --br:#8B3A2B;--brh:#7A3225;--brl:#A65A4A;--olive:#6F7F6A;
  --green:#2E7D32;--gsoft:#E8F5E9;--red:#C62828;--amber:#F9A825;--blue:#1565C0;
  --t1:#1F1F1F;--t2:#6B6B6B;--border:#EAE6E1;
  --sh1:0 1px 4px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.09);--sh3:0 8px 32px rgba(0,0,0,.11);
  --r:12px;--font:'IBM Plex Sans Arabic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg2);color:var(--t1);min-height:100vh;direction:rtl}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--br) 0%,#6B2A1E 100%);
  color:#fff;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  height:68px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(139,58,43,.3);
}
.header-brand{display:flex;align-items:center;gap:12px}
.header-brand img{height:40px;border-radius:8px;border:2px solid rgba(255,255,255,.3)}
.brand-text h1{font-size:16px;font-weight:700;line-height:1.2}
.brand-text p{font-size:11px;opacity:.75;margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.live-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;
}
.live-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* PERIOD SELECTOR */
.period-bar{
  background:#fff;border-bottom:1px solid var(--border);
  padding:14px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  position:sticky;top:68px;z-index:90;box-shadow:var(--sh1);
}
.period-bar label{font-size:12px;font-weight:600;color:var(--t2);white-space:nowrap}
.period-select{
  padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-family:var(--font);font-size:13px;color:var(--t1);background:#fff;
  outline:none;cursor:pointer;direction:rtl;
}
.period-select:focus{border-color:var(--br)}
.report-date{font-size:12px;color:var(--t2);margin-right:auto}

/* MAIN CONTENT */
.main{padding:28px 32px;max-width:1200px;margin:0 auto}

/* KPI HERO */
.kpi-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  margin-bottom:28px;
}
.kpi-card{
  background:#fff;border-radius:var(--r);border:1px solid var(--border);
  padding:20px;transition:all .25s;cursor:default;
  position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:0;right:0;
  width:4px;height:100%;background:var(--br);
  border-radius:0 var(--r) var(--r) 0;
}
.kpi-card:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.kpi-icon{font-size:26px;margin-bottom:10px}
.kpi-val{font-size:32px;font-weight:700;color:var(--t1);line-height:1}
.kpi-label{font-size:12px;color:var(--t2);margin-top:6px;font-weight:500}
.kpi-trend{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;font-size:12px;font-weight:600;
  padding:3px 8px;border-radius:12px;
}
.trend-up{background:var(--gsoft);color:var(--green)}
.trend-down{background:#FFEBEE;color:var(--red)}
.trend-neutral{background:var(--bg3);color:var(--t2)}

/* SECTION CARD */
.card{
  background:#fff;border-radius:var(--r);border:1px solid var(--border);
  box-shadow:var(--sh1);margin-bottom:20px;overflow:hidden;
}
.card-head{
  display:flex;align-items:center;gap:10px;
  padding:16px 22px;border-bottom:1px solid var(--border);
  background:#fff;
}
.card-icon{
  width:34px;height:34px;border-radius:8px;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.card-title{font-size:14px;font-weight:600;color:var(--t1)}
.card-sub{font-size:12px;color:var(--t2);margin-top:2px}
.card-body{padding:22px}

/* STATS ROW */
.stats-row{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.stat-item{
  flex:1;text-align:center;padding:16px 12px;
  border-left:1px solid var(--border);
}
.stat-item:last-child{border-left:none}
.stat-val{font-size:22px;font-weight:700;color:var(--br)}
.stat-lbl{font-size:11px;color:var(--t2);margin-top:4px;font-weight:500}

/* PROGRESS BAR */
.progress-wrap{margin-bottom:14px}
.progress-head{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.progress-label{font-weight:500;color:var(--t1)}
.progress-val{color:var(--t2)}
.progress-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--br);transition:width .8s ease}
.progress-fill.green{background:var(--green)}
.progress-fill.amber{background:var(--amber)}
.progress-fill.blue{background:var(--blue)}

/* CONTENT GRID */
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.content-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}

/* TEXT BLOCK */
.text-block{
  background:var(--bg3);border-radius:10px;padding:20px;
  line-height:1.8;font-size:14px;color:var(--t1);
  white-space:pre-wrap;border-right:3px solid var(--br);
}
.text-block.green{border-right-color:var(--green)}
.text-block.amber{border-right-color:var(--amber)}

/* ACHIEVEMENT LIST */
.achievement-list{display:flex;flex-direction:column;gap:10px}
.achievement-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;background:var(--gsoft);
  border-radius:8px;border:1px solid #c8e6c9;
}
.ach-icon{font-size:20px;flex-shrink:0}
.ach-text{font-size:13px;color:var(--t1);line-height:1.5}

/* LOADING */
#loadingState{
  display:flex;align-items:center;justify-content:center;
  min-height:60vh;flex-direction:column;gap:16px;
}
.spinner{
  width:44px;height:44px;border:3px solid var(--border);
  border-top-color:var(--br);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingState p{font-size:14px;color:var(--t2);font-weight:500}

/* EMPTY */
.empty-rep{
  text-align:center;padding:60px 20px;
}
.empty-rep .big-icon{font-size:56px;margin-bottom:16px}
.empty-rep h2{font-size:18px;font-weight:600;color:var(--t1);margin-bottom:8px}
.empty-rep p{font-size:14px;color:var(--t2)}

/* NUMBER FORMAT */
.num{font-feature-settings:"tnum"}

/* FOOTER */
.footer{
  text-align:center;padding:24px;color:var(--t2);
  font-size:12px;border-top:1px solid var(--border);
  margin-top:40px;
}

@media(max-width:900px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .content-grid,.content-grid-3{grid-template-columns:1fr}
  .header,.period-bar,.main{padding-left:16px;padding-right:16px}
  .stats-row{flex-wrap:wrap}
  .stat-item{min-width:50%;border-bottom:1px solid var(--border)}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr}
}
</style>
</head>

async function initSupabase() {
  if (typeof window.supabase !== 'undefined') {

  return false;

// ============================================================
// FORMAT HELPERS
// ============================================================
function fmt(n) {
  if (n === null || n === undefined) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'م';
  if (n >= 1000) return (n/1000).toFixed(1) + 'ك';
  return n.toString();
}
function fmtMoney(n) {
  if (!n) return '—';
  return n.toLocaleString('ar-SA') + ' ₺';
}
function fmtPct(n) {
  if (n === null || n === undefined) return '—';
  return (n > 0 ? '+' : '') + n + '%';
}
function trendClass(n) {
  if (!n) return 'trend-neutral';
  return n > 0 ? 'trend-up' : 'trend-down';
}
function trendIcon(n) {
  if (!n) return '→';
  return n > 0 ? '↑' : '↓';
}

// ============================================================
// LOAD REPORT
// ============================================================

  const month = parseInt(document.getElementById('selMonth').value);

  main.innerHTML = '<div id="loadingState"><div class="spinner"></div><p>جارٍ التحميل...</p></div>';

    renderNoConfig();
    return;

    .from('reports')

    .not('id', 'is', null)
    .not('id', 'is', null)
    .eq('status', 'published')
    .order('created_at', { ascending: false })

}

      <div class="card">
        <div class="card-head">
          <div class="card-icon">🎯</div>
          <div><div class="card-title">الحملات الإعلانية</div></div>
        </div>
        <div class="card-body">
          <div class="stats-row">
            <div class="stat-item"><div class="stat-val">${fmtMoney(d.campSpend)}</div><div class="stat-lbl">إنفاق</div></div>
            <div class="stat-item"><div class="stat-val">${fmt(d.campReach)}</div><div class="stat-lbl">وصول</div></div>
            <div class="stat-item"><div class="stat-val">${fmt(rd.campClicks)}</div><div class="stat-lbl">نقرات</div></div>
          </div>
          ${rd.campNotes ? '<p style="font-size:13px;color:var(--t2);margin-top:12px;line-height:1.6">' + rd.campNotes + '</p>' : ''}
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-icon">🛵</div>
          <div><div class="card-title">تطبيقات التوصيل</div></div>
        </div>
        <div class="card-body">
          <div class="stats-row">
            <div class="stat-item"><div class="stat-val">${fmt(d.deliveryOrders)}</div><div class="stat-lbl">طلبات</div></div>
            <div class="stat-item"><div class="stat-val">${fmtPct(d.deliveryGrowth)}</div><div class="stat-lbl">نمو</div></div>
            <div class="stat-item"><div class="stat-val">${rd.delRating || '—'} ⭐</div><div class="stat-lbl">تقييم</div></div>
          </div>
          ${rd.delNotes ? '<p style="font-size:13px;color:var(--t2);margin-top:12px;line-height:1.6">' + rd.delNotes + '</p>' : ''}
        </div>
      </div>
    </div>

    <!-- ACHIEVEMENTS -->
    ${rd.achievements ? `
    <div class="card">
      <div class="card-head">
        <div class="card-icon">🏆</div>
        <div><div class="card-title">إنجازات الأسبوع</div></div>
      </div>
      <div class="card-body">
        <div class="achievement-list">
          ${achievementItems.length > 0 
            ? achievementItems.map(item => `<div class="achievement-item"><div class="ach-icon">✅</div><div class="ach-text">${item}</div></div>`).join('')
            : '<div class="text-block green">' + rd.achievements + '</div>'
          }
        </div>
      </div>
    </div>` : ''}

    <!-- NOTES & NEXT PLAN -->
    <div class="content-grid">
      ${rd.notes ? `
      <div class="card">
        <div class="card-head">
          <div class="card-icon">📌</div>
          <div><div class="card-title">ملاحظات هامة</div></div>
        </div>
        <div class="card-body">
          <div class="text-block amber">${rd.notes}</div>
        </div>
      </div>` : ''}

      ${rd.nextPlan ? `
      <div class="card">
        <div class="card-head">
          <div class="card-icon">📅</div>
          <div><div class="card-title">خطة الأسبوع القادم</div></div>
        </div>
        <div class="card-body">
          ${nextPlanItems.length > 0
            ? nextPlanItems.map((item,i) => `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;font-weight:700;color:var(--br);background:var(--bg3);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</span><span style="font-size:13px;color:var(--t1);line-height:1.6">${item}</span></div>`).join('')
            : '<div class="text-block">' + rd.nextPlan + '</div>'
          }
        </div>
      </div>` : ''}
    </div>
  `;
}

// ============================================================
// EMPTY / ERROR STATES
// ============================================================
function renderEmpty() {
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-rep">
      <div class="big-icon">📊</div>
      <h2>لا يوجد تقرير منشور لهذه الفترة</h2>
      <p>جرّب اختيار أسبوع أو شهر مختلف</p>
    </div>
  `;
}

function renderNoConfig() {
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-rep">
      <div class="big-icon">⚙️</div>
      <h2>يرجى إعداد قاعدة البيانات</h2>
      <p>أضف SUPABASE_URL و SUPABASE_KEY في الكود لعرض التقارير</p>
    </div>
  `;
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  const now = new Date();
  document.getElementById('selMonth').value = now.getMonth() + 1;

  await initSupabase();

  if (!supabase || SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    // Load latest report without filter
    renderNoConfig();
    return;
  }

  // Try to load the latest published report first
  const { data: latest } = await supabase
    .from('reports')
    .select('month, week_number')
    .eq('status', 'published')
    .order('created_at', { ascending: false })
    .limit(1);

  if (latest && latest.length > 0) {
    document.getElementById('selMonth').value = latest[0].month;
    document.getElementById('selWeek').value = latest[0].week_number;
  }

  loadReport();
});
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
